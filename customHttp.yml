customHeaders:
  - pattern: '/images/**/*'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '/_next/static/**/*'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
  - pattern: '/_next/image*'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000, immutable'
