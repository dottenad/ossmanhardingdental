version: 1
frontend:
    phases:
        preBuild:
            commands:
                - npm ci
        build:
            commands:
                # Amplify does not inject Console env vars into the Next.js serverless runtime.
                # Write them to .env.production so API routes and SSR can read them.
                - env | grep -E '^JOBBER_' >> .env.production || true
                - env | grep -E '^NEXT_PUBLIC_SANITY_' >> .env.production || true
                - env | grep -E '^REVALIDATION_SECRET' >> .env.production || true
                - npm run build
    artifacts:
        baseDirectory: .next
        files:
            - "**/*"
    cache:
        paths:
            - node_modules/**/*
            - .next/cache/**/*
customHeaders:
    - pattern: "/images/**"
      headers:
          - key: "Cache-Control"
            value: "public, max-age=31536000, immutable"
    - pattern: "/_next/image/**"
      headers:
          - key: "Cache-Control"
            value: "public, max-age=31536000, immutable"
    - pattern: "/_next/static/**"
      headers:
          - key: "Cache-Control"
            value: "public, max-age=31536000, immutable"
